<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<meta name="theme-color" content="#0a0a0f"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="black"/>
<meta name="apple-mobile-web-app-title" content="TerminMeister"/>
<link rel="manifest" href="manifest.json"/>
<title>TerminMeister</title>
<link href="https://fonts.googleapis.com/css2?family=Vazirmatn:wght@300;400;500;600;700&family=Cormorant+Garamond:ital,wght@0,600;1,400&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet"/>
<style>
:root {
  --bg: #0a0a0f;
  --bg2: #0f0f18;
  --surface: #13131f;
  --surface2: #1a1a2e;
  --surface3: #22223a;
  --border: rgba(255,255,255,0.07);
  --border2: rgba(255,255,255,0.12);
  --text: #eeeef5;
  --muted: #6b6b8a;
  --accent: #7c6af5;
  --accent2: #f5a623;
  --red: #f56a6a;
  --green: #6af5a0;
  --blue: #6ab8f5;
  --pink: #f56ab8;
  --r: 14px;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
html,body{height:100%;overflow:hidden;background:var(--bg);}
body{font-family:'Vazirmatn',sans-serif;color:var(--text);display:flex;flex-direction:column;}

/* ── ANIMATED BG ── */
.bg-orb{position:fixed;border-radius:50%;filter:blur(80px);opacity:0.12;pointer-events:none;z-index:0;}
.bg-orb1{width:300px;height:300px;background:var(--accent);top:-100px;right:-100px;animation:orb1 8s ease-in-out infinite alternate;}
.bg-orb2{width:200px;height:200px;background:var(--accent2);bottom:100px;left:-80px;animation:orb2 10s ease-in-out infinite alternate;}
@keyframes orb1{to{transform:translate(-30px,40px) scale(1.1);}}
@keyframes orb2{to{transform:translate(40px,-30px) scale(0.9);}}

/* ── HEADER ── */
.header{
  position:relative;z-index:10;
  padding:14px 18px 12px;
  background:rgba(10,10,15,0.9);
  backdrop-filter:blur(20px);
  border-bottom:1px solid var(--border);
  display:flex;align-items:center;justify-content:space-between;
  flex-shrink:0;
}
.logo-wrap{display:flex;flex-direction:column;}
.logo{
  font-family:'Cormorant Garamond',serif;
  font-size:22px;font-weight:600;
  background:linear-gradient(135deg,#a78bfa,#f5a623);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;
  background-clip:text;letter-spacing:0.5px;
}
.logo-sub{font-size:10px;color:var(--muted);letter-spacing:2px;text-transform:uppercase;margin-top:1px;}
.header-date{
  text-align:right;
  font-family:'DM Mono',monospace;
}
.header-date .day{font-size:22px;font-weight:500;color:var(--text);line-height:1;}
.header-date .month{font-size:10px;color:var(--muted);letter-spacing:1px;}

/* ── MAIN ── */
.main{flex:1;overflow-y:auto;position:relative;z-index:1;}
.screen{display:none;padding:16px;}
.screen.active{display:block;}

/* ── NAV ── */
.nav{
  display:flex;background:rgba(10,10,15,0.95);
  backdrop-filter:blur(20px);
  border-top:1px solid var(--border);
  flex-shrink:0;position:relative;z-index:10;
}
.nav-item{
  flex:1;padding:10px 4px 8px;
  display:flex;flex-direction:column;align-items:center;gap:3px;
  cursor:pointer;color:var(--muted);font-size:10px;
  transition:all 0.2s;position:relative;
}
.nav-item.active{color:var(--accent);}
.nav-item.active::before{
  content:'';position:absolute;top:0;left:20%;right:20%;
  height:2px;background:var(--accent);border-radius:0 0 4px 4px;
}
.nav-icon{font-size:20px;}

/* ── TODAY SCREEN ── */
.today-hero{
  background:linear-gradient(135deg,rgba(124,106,245,0.15),rgba(245,166,35,0.1));
  border:1px solid rgba(124,106,245,0.2);
  border-radius:20px;padding:20px;margin-bottom:16px;
  position:relative;overflow:hidden;
}
.today-hero::before{
  content:'';position:absolute;top:-20px;right:-20px;
  width:100px;height:100px;
  background:radial-gradient(circle,rgba(124,106,245,0.3),transparent 70%);
  border-radius:50%;
}
.today-greeting{font-size:13px;color:var(--muted);direction:rtl;margin-bottom:4px;}
.today-name{font-family:'Cormorant Garamond',serif;font-size:26px;color:var(--text);}
.today-stats{display:flex;gap:10px;margin-top:14px;}
.stat-pill{
  flex:1;background:rgba(255,255,255,0.05);
  border:1px solid var(--border2);border-radius:10px;
  padding:10px;text-align:center;
}
.stat-num{font-size:22px;font-weight:700;color:var(--accent);}
.stat-label{font-size:10px;color:var(--muted);direction:rtl;margin-top:2px;}

.section-title{
  font-size:11px;color:var(--muted);letter-spacing:2px;
  text-transform:uppercase;margin-bottom:10px;direction:rtl;
  display:flex;justify-content:space-between;align-items:center;
}

/* ── APPOINTMENT CARD ── */
.appt-card{
  background:var(--surface);border:1px solid var(--border);
  border-radius:var(--r);padding:14px;margin-bottom:10px;
  display:flex;gap:12px;align-items:flex-start;
  cursor:pointer;transition:all 0.2s;position:relative;overflow:hidden;
}
.appt-card:active{transform:scale(0.98);}
.appt-card.expanded{border-color:rgba(124,106,245,0.3);}
.appt-time-col{
  display:flex;flex-direction:column;align-items:center;
  min-width:44px;
}
.appt-time{
  font-family:'DM Mono',monospace;font-size:13px;
  font-weight:500;color:var(--text);
}
.appt-date-small{font-size:9px;color:var(--muted);margin-top:2px;text-align:center;}
.appt-dot{
  width:8px;height:8px;border-radius:50%;
  margin-top:6px;flex-shrink:0;
}
.appt-body{flex:1;}
.appt-title-row{display:flex;justify-content:space-between;align-items:flex-start;}
.appt-title{font-size:15px;font-weight:600;color:var(--text);}
.cat-badge{
  font-size:9px;padding:2px 8px;border-radius:8px;
  font-weight:600;white-space:nowrap;margin-right:4px;
}
.appt-loc{font-size:12px;color:var(--muted);margin-top:3px;direction:rtl;}
.appt-detail{
  display:none;margin-top:10px;padding-top:10px;
  border-top:1px solid var(--border);
}
.appt-card.expanded .appt-detail{display:block;}
.detail-note{
  font-size:12px;color:var(--text);line-height:1.7;
  direction:rtl;background:var(--surface2);
  border-radius:8px;padding:10px;margin-bottom:8px;
}
.appt-actions{display:flex;gap:6px;flex-wrap:wrap;}
.action-btn{
  padding:6px 12px;border-radius:8px;font-size:11px;
  cursor:pointer;border:1px solid var(--border2);
  background:var(--surface2);color:var(--muted);
  font-family:'Vazirmatn',sans-serif;direction:rtl;
  transition:all 0.2s;
}
.action-btn.edit{color:var(--blue);border-color:rgba(106,184,245,0.3);}
.action-btn.delete{color:var(--red);border-color:rgba(245,106,106,0.3);}
.action-btn.done{color:var(--green);border-color:rgba(106,245,160,0.3);}

/* ── EMPTY STATE ── */
.empty-state{
  text-align:center;padding:40px 20px;
  color:var(--muted);
}
.empty-icon{font-size:48px;margin-bottom:12px;opacity:0.5;}
.empty-text{font-size:14px;line-height:1.7;direction:rtl;}

/* ── CALENDAR ── */
.cal-header{
  display:flex;align-items:center;justify-content:space-between;
  margin-bottom:14px;
}
.cal-nav{
  background:var(--surface2);border:1px solid var(--border);
  border-radius:8px;padding:6px 14px;
  color:var(--text);font-size:16px;cursor:pointer;
}
/* ── COLOR FIXES ── */
.today-greeting{font-size:13px;color:#b0b0cc !important;direction:rtl;margin-bottom:4px;}
.today-name{font-family:'Cormorant Garamond',serif;font-size:26px;color:#f0e6ff !important;}
.header-date .day{font-size:22px;font-weight:500;color:#e0d4ff !important;line-height:1;}
.header-date .month{font-size:10px;color:#9090b0 !important;letter-spacing:1px;}
.logo-sub{font-size:10px;color:#8080a0 !important;letter-spacing:2px;text-transform:uppercase;margin-top:1px;}
.section-title{color:#9090b8 !important;}
.stat-label{font-size:10px;color:#8888aa !important;direction:rtl;margin-top:2px;}
.stat-num{font-size:22px;font-weight:700;color:#c4b5fd !important;}
.uc-day{font-size:10px;color:#8888aa !important;margin-bottom:3px;}
.uc-title{font-size:12px;font-weight:600;color:#e8e0ff !important;direction:rtl;}
.appt-title{font-size:15px;font-weight:600;color:#eeeeff !important;}
.appt-loc{font-size:12px;color:#9090b0 !important;margin-top:3px;direction:rtl;}
.cal-day-name{text-align:center;font-size:10px;color:#8888aa !important;padding:4px 0;font-weight:700;}
.empty-text{font-size:14px;line-height:1.7;direction:rtl;color:#8888aa !important;}
.form-label{font-size:11px;color:#9090b8 !important;margin-bottom:5px;display:block;direction:rtl;letter-spacing:0.5px;}
.ai-sub{font-size:11px;color:#9090b0 !important;direction:rtl;margin-top:3px;}
.ai-title{font-family:'Cormorant Garamond',serif;font-size:18px;color:#f0e6ff !important;}
.msg-ai{color:#e8e0ff !important;}
.msg-user{color:#f0e6ff !important;}
.cal-month{font-family:'Cormorant Garamond',serif;font-size:18px;color:#f0e6ff !important;font-weight:700;text-align:center;}
.cal-grid{
  display:grid;grid-template-columns:repeat(7,1fr);
  gap:4px;margin-bottom:16px;
}
.cal-day-name{
  text-align:center;font-size:10px;color:var(--muted);
  padding:4px 0;font-weight:600;
}
.cal-day{
  aspect-ratio:1;display:flex;align-items:center;justify-content:center;
  flex-direction:column;
  border-radius:8px;font-size:13px;cursor:pointer;
  position:relative;transition:all 0.15s;color:var(--muted);
}
.cal-day.current-month{color:#ddd;}
.cal-day.weekend{color:#a78bfa !important;}
.cal-day.holiday{
  background:rgba(245,106,106,0.12);
  color:#f56a6a !important;
}
.cal-day.today{
  background:rgba(124,106,245,0.25);
  color:var(--accent) !important;font-weight:700;
  border:1px solid rgba(124,106,245,0.5);
}
.cal-day.selected{
  background:var(--accent) !important;
  color:#fff !important;font-weight:700;
  box-shadow:0 2px 12px rgba(124,106,245,0.4);
}
.cal-day.has-appt::after{
  content:'';position:absolute;bottom:2px;left:50%;
  transform:translateX(-50%);
  width:4px;height:4px;border-radius:50%;
  background:var(--accent2);
}
.cal-day:active{transform:scale(0.9);}
.cal-selected-appts{margin-top:4px;}

/* ── ADD FORM ── */
.form-card{
  background:var(--surface);border:1px solid var(--border);
  border-radius:20px;padding:20px;margin-bottom:12px;
}
.form-title{
  font-family:'Cormorant Garamond',serif;
  font-size:20px;margin-bottom:16px;color:var(--text);direction:rtl;
}
.form-group{margin-bottom:12px;}
.form-label{
  font-size:11px;color:var(--muted);margin-bottom:5px;
  display:block;direction:rtl;letter-spacing:0.5px;
}
.form-input{
  width:100%;background:var(--surface2);
  border:1px solid var(--border2);border-radius:10px;
  padding:11px 13px;color:var(--text);
  font-family:'Vazirmatn',sans-serif;font-size:14px;
  outline:none;transition:border-color 0.2s;
}
.form-input:focus{border-color:var(--accent);}
.form-input::placeholder{color:var(--muted);}
textarea.form-input{resize:none;line-height:1.6;}
select.form-input{cursor:pointer;}
option{background:var(--surface);}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:10px;}

/* CAT SELECTOR */
.cat-selector{display:flex;gap:6px;flex-wrap:wrap;}
.cat-opt{
  padding:6px 14px;border-radius:20px;font-size:12px;
  cursor:pointer;border:1px solid var(--border2);
  background:var(--surface2);color:var(--muted);
  transition:all 0.2s;direction:rtl;
  font-family:'Vazirmatn',sans-serif;
}
.cat-opt.active{font-weight:700;}

/* ── AI SCREEN ── */
.ai-header{
  background:linear-gradient(135deg,rgba(124,106,245,0.1),rgba(245,166,35,0.05));
  border:1px solid rgba(124,106,245,0.2);
  border-radius:16px;padding:16px;margin-bottom:16px;
  text-align:center;
}
.ai-avatar{font-size:36px;margin-bottom:6px;}
.ai-title{
  font-family:'Cormorant Garamond',serif;
  font-size:18px;color:var(--text);
}
.ai-sub{font-size:11px;color:var(--muted);direction:rtl;margin-top:3px;}

.chat-messages{
  display:flex;flex-direction:column;gap:10px;
  margin-bottom:14px;min-height:200px;
}
.msg{
  max-width:85%;padding:10px 14px;border-radius:14px;
  font-size:13px;line-height:1.7;
}
.msg-ai{
  align-self:flex-start;
  background:var(--surface2);border:1px solid var(--border);
  color:var(--text);border-radius:4px 14px 14px 14px;direction:rtl;
}
.msg-user{
  align-self:flex-end;
  background:rgba(124,106,245,0.2);
  border:1px solid rgba(124,106,245,0.3);
  color:var(--text);border-radius:14px 4px 14px 14px;direction:rtl;
}
.msg-loading{
  align-self:flex-start;
  background:var(--surface2);border:1px solid var(--border);
  padding:12px 16px;border-radius:4px 14px 14px 14px;
}
.typing-dot{
  display:inline-block;width:6px;height:6px;border-radius:50%;
  background:var(--muted);margin:0 2px;
  animation:typing 1.2s ease-in-out infinite;
}
.typing-dot:nth-child(2){animation-delay:0.2s;}
.typing-dot:nth-child(3){animation-delay:0.4s;}
@keyframes typing{0%,80%,100%{transform:translateY(0);}40%{transform:translateY(-6px);}}

.chat-input-row{display:flex;gap:8px;}
.chat-input{
  flex:1;background:var(--surface2);border:1px solid var(--border2);
  border-radius:12px;padding:11px 13px;color:var(--text);
  font-family:'Vazirmatn',sans-serif;font-size:14px;
  outline:none;direction:rtl;
}
.chat-input:focus{border-color:var(--accent);}
.send-btn{
  background:var(--accent);border:none;border-radius:12px;
  padding:11px 16px;font-size:18px;cursor:pointer;
  transition:opacity 0.2s;
}
.send-btn:active{opacity:0.8;}

.quick-prompts{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:12px;}
.quick-prompt{
  padding:5px 12px;border-radius:20px;font-size:11px;
  background:var(--surface2);border:1px solid var(--border);
  color:var(--muted);cursor:pointer;direction:rtl;
  font-family:'Vazirmatn',sans-serif;transition:all 0.2s;
}
.quick-prompt:active{border-color:var(--accent);color:var(--accent);}

/* ── UPCOMING STRIP ── */
.upcoming-strip{
  display:flex;gap:8px;overflow-x:auto;
  padding-bottom:8px;margin-bottom:16px;
  scrollbar-width:none;
}
.upcoming-strip::-webkit-scrollbar{display:none;}
.upcoming-chip{
  flex-shrink:0;background:var(--surface);
  border:1px solid var(--border);border-radius:12px;
  padding:10px 14px;min-width:100px;
  cursor:pointer;transition:border-color 0.2s;
}
.upcoming-chip:active{border-color:var(--accent);}
.uc-day{font-size:10px;color:var(--muted);margin-bottom:3px;}
.uc-title{font-size:12px;font-weight:600;color:var(--text);direction:rtl;}
.uc-time{font-family:'DM Mono',monospace;font-size:11px;color:var(--accent);margin-top:2px;}

/* ── TOAST ── */
.toast{
  position:fixed;bottom:80px;left:50%;
  transform:translateX(-50%) translateY(100px);
  background:var(--green);color:#0a0a0f;
  padding:10px 22px;border-radius:20px;
  font-size:13px;font-weight:700;z-index:9999;
  transition:transform 0.35s cubic-bezier(0.34,1.56,0.64,1);
  direction:rtl;white-space:nowrap;
  box-shadow:0 4px 20px rgba(0,0,0,0.5);
  pointer-events:none;
}
.toast.show{transform:translateX(-50%) translateY(0);}

/* ── FAB ── */
.fab{
  position:fixed;bottom:72px;right:18px;z-index:50;
  width:52px;height:52px;border-radius:50%;
  background:linear-gradient(135deg,var(--accent),#a78bfa);
  border:none;font-size:24px;cursor:pointer;
  box-shadow:0 4px 20px rgba(124,106,245,0.4);
  transition:transform 0.2s;display:flex;align-items:center;justify-content:center;
}
.fab:active{transform:scale(0.92);}

/* ── MODAL ── */
.modal-overlay{
  position:fixed;inset:0;background:rgba(0,0,0,0.7);
  z-index:100;display:none;align-items:flex-end;
  backdrop-filter:blur(4px);
}
.modal-overlay.open{display:flex;}
.modal{
  background:var(--surface);border-radius:24px 24px 0 0;
  padding:20px;width:100%;
  border-top:1px solid var(--border2);
  max-height:90vh;overflow-y:auto;
  animation:slideUp 0.3s cubic-bezier(0.34,1.56,0.64,1);
}
@keyframes slideUp{from{transform:translateY(100%);}to{transform:translateY(0);}}
.modal-handle{
  width:36px;height:4px;border-radius:2px;
  background:var(--surface3);margin:0 auto 16px;
}
.modal-title{
  font-family:'Cormorant Garamond',serif;
  font-size:20px;color:var(--text);
  margin-bottom:16px;direction:rtl;
}

/* INSTALL */
#install-bar{
  display:none;
  background:linear-gradient(135deg,rgba(124,106,245,0.9),rgba(167,139,250,0.9));
  padding:10px 16px;direction:rtl;align-items:center;gap:8px;
  flex-shrink:0;z-index:10;backdrop-filter:blur(10px);
}
#install-bar.show{display:flex;}
#install-bar p{flex:1;font-size:12px;color:#fff;}
#install-bar button{
  background:rgba(255,255,255,0.2);border:1px solid rgba(255,255,255,0.4);
  color:#fff;border-radius:8px;padding:5px 12px;font-size:12px;
  cursor:pointer;font-family:'Vazirmatn',sans-serif;white-space:nowrap;
}
</style>
</head>
<body>

<div class="bg-orb bg-orb1"></div>
<div class="bg-orb bg-orb2"></div>

<div id="install-bar">
  <button onclick="document.getElementById('install-bar').classList.remove('show')" style="background:none;border:none;color:rgba(255,255,255,0.7);font-size:16px;padding:0;">✕</button>
  <p>TerminMeister را مثل اپ نصب کن!</p>
  <button id="install-btn">نصب ▼</button>
</div>

<header class="header">
  <div class="logo-wrap">
    <div class="logo">TerminMeister</div>
    <div class="logo-sub">منشی هوشمند شما</div>
  </div>
  <div class="header-date">
    <div class="day" id="hdr-day">--</div>
    <div class="month" id="hdr-month">---</div>
  </div>
</header>

<div class="main">

  <!-- TODAY -->
  <div id="screen-today" class="screen active">
    <div class="today-hero">
      <div class="today-greeting" id="greeting">سلام!</div>
      <div class="today-name">Negah عزیز 🌟</div>
      <div class="today-stats">
        <div class="stat-pill">
          <div class="stat-num" id="stat-today">0</div>
          <div class="stat-label">قرار امروز</div>
        </div>
        <div class="stat-pill">
          <div class="stat-num" id="stat-week">0</div>
          <div class="stat-label">این هفته</div>
        </div>
        <div class="stat-pill">
          <div class="stat-num" id="stat-total">0</div>
          <div class="stat-label">کل قرارها</div>
        </div>
      </div>
    </div>

    <div class="section-title">
      <span>قرارهای پیش رو</span>
    </div>
    <div class="upcoming-strip" id="upcoming-strip"></div>

    <div class="section-title">
      <span>قرارهای امروز</span>
    </div>
    <div id="today-list"></div>
  </div>

  <!-- CALENDAR -->
  <div id="screen-calendar" class="screen">
    <div class="cal-header">
      <button class="cal-nav" onclick="changeMonth(-1)">‹</button>
      <div class="cal-month" id="cal-month-label"></div>
      <button class="cal-nav" onclick="changeMonth(1)">›</button>
    </div>
    <div class="cal-grid" id="cal-grid"></div>
    <div class="cal-selected-appts">
      <div class="section-title"><span id="cal-selected-label">انتخاب روز</span></div>
      <div id="cal-day-list"></div>
    </div>
  </div>

  <!-- ADD -->
  <div id="screen-add" class="screen">
    <div class="form-card">
      <div class="form-title" id="form-main-title">قرار جدید ✨</div>

      <div class="form-group">
        <label class="form-label">عنوان قرار *</label>
        <input class="form-input" id="f-title" placeholder="مثلاً: Arzttermin / ویزیت دکتر"/>
      </div>

function getCat(id){return CATS.find(c=>c.id===id)||CATS[7];}

// ══════ APPOINTMENT CARD ══════
function apptCardHTML(a, showDate=false){
  const cat = getCat(a.cat);
  const dt = new Date(a.date+'T'+(a.time||'00:00'));

  const isPast = dt < now && a.date <= today.toISOString().split('T')[0];

        ${showDate?`<div class="appt-date-small">${a.date.slice(5).replace('-','/')}</div>`:''}

      </div>

        <div class="appt-title-row">
          <div class="appt-title" style="${a.done?'text-decoration:line-through;color:var(--muted)':''}">${a.title}</div>
          <span class="cat-badge" style="background:${cat.color}22;color:${cat.color};border:1px solid ${cat.color}44;">${cat.fa}</span>
        </div>
        ${a.location?`<div class="appt-loc">📍 ${a.location}</div>`:''}

            <button class="action-btn done" onclick="toggleDone(event,${a.id})">${a.done?'↩ باز کردن':'✅ انجام شد'}</button>
            <button class="action-btn edit" onclick="openEdit(event,${a.id})">✏️ ویرایش</button>
            <button class="action-btn delete" onclick="deleteAppt(event,${a.id})">🗑 حذف</button>
          </div>
        </div>
      </div>
    </div>`;
}

function toggleAppt(id){
  document.getElementById('ac-'+id)?.classList.toggle('expanded');
}

// ══════ TODAY ══════
function renderToday(){
  const todayStr = today.toISOString().split('T')[0];
  const todayAppts = appointments.filter(a=>a.date===todayStr).sort((a,b)=>(a.time||'').localeCompare(b.time||''));
  const weekEnd = new Date(today); weekEnd.setDate(weekEnd.getDate()+7);
  const weekAppts = appointments.filter(a=>a.date>=todayStr && a.date<=weekEnd.toISOString().split('T')[0]);
  const upcoming = appointments.filter(a=>a.date>todayStr).sort((a,b)=>a.date.localeCompare(b.date)).slice(0,8);

  document.getElementById('stat-today').textContent = todayAppts.length;
  document.getElementById('stat-week').textContent = weekAppts.length;
  document.getElementById('stat-total').textContent = appointments.length;

  // upcoming strip
  const strip = document.getElementById('upcoming-strip');
  if(upcoming.length===0){
    strip.innerHTML=`<div style="color:var(--muted);font-size:12px;direction:rtl;padding:8px 0;">قرار پیش رویی ندارید 🎉</div>`;
  } else {
    strip.innerHTML = upcoming.map(a=>{
      const cat=getCat(a.cat);
      const d=new Date(a.date+'T00:00');
      const days=['یک','دو','سه','چهار','پنج','جمعه','شنبه'];
      return `<div class="upcoming-chip" onclick="goToDate('${a.date}')" style="border-top:2px solid ${cat.color};">
        <div class="uc-day">${d.toLocaleDateString('fa-IR',{month:'short',day:'numeric'})}</div>
        <div class="uc-title">${a.title}</div>
        ${a.time?`<div class="uc-time">${a.time}</div>`:''}
      </div>`;
    }).join('');
  }

  // today list
  const list = document.getElementById('today-list');
  if(todayAppts.length===0){
    list.innerHTML=`<div class="empty-state"><div class="empty-icon">🌿</div><div class="empty-text">امروز قراری ندارید<br/>از دکمه + قرار جدید بسازید</div></div>`;
  } else {
    list.innerHTML = todayAppts.map(a=>apptCardHTML(a)).join('');
  }
}

// ══════ FEIERTAGE Brandenburg/Berlin ══════
function getHolidays(year){
  // Easter calculation (Gauss algorithm)
  const a=year%19,b=Math.floor(year/100),c=year%100;
  const d=Math.floor(b/4),e=b%4,f=Math.floor((b+8)/25);
  const g=Math.floor((b-f+1)/3),h=(19*a+b-d-g+15)%30;
  const i=Math.floor(c/4),k=c%4,l=(32+2*e+2*i-h-k)%7;
  const m=Math.floor((a+11*h+22*l)/451);
  const month=Math.floor((h+l-7*m+114)/31);
  const day=(h+l-7*m+114)%31+1;
  const easter = new Date(year,month-1,day);
  const e2=(d,n)=>{const x=new Date(easter);x.setDate(x.getDate()+n);return x.toISOString().split('T')[0];};

  return {
    [`${year}-01-01`]:{de:'Neujahr',fa:'سال نو'},
    [`${year}-05-01`]:{de:'Tag der Arbeit',fa:'روز کارگر'},
    [`${year}-10-03`]:{de:'Tag der Deutschen Einheit',fa:'روز وحدت آلمان'},
    [`${year}-12-25`]:{de:'1. Weihnachtstag',fa:'کریسمس'},
    [`${year}-12-26`]:{de:'2. Weihnachtstag',fa:'کریسمس دوم'},
    [e2(easter,-2)]:{de:'Karfreitag',fa:'جمعه مقدس'},
    [e2(easter,0)]:{de:'Ostersonntag',fa:'یکشنبه عید پاک'},
    [e2(easter,1)]:{de:'Ostermontag',fa:'دوشنبه عید پاک'},
    [e2(easter,39)]:{de:'Christi Himmelfahrt',fa:'عروج مسیح'},
    [e2(easter,49)]:{de:'Pfingstsonntag',fa:'یکشنبه پنطیکاست'},
    [e2(easter,50)]:{de:'Pfingstmontag',fa:'دوشنبه پنطیکاست'},
    // Brandenburg only
    [`${year}-10-31`]:{de:'Reformationstag 🎃',fa:'روز رفرماسیون'},
  };
}

// ══════ CALENDAR ══════
function renderCalendar(){
  const monthsDE=['Januar','Februar','März','April','Mai','Juni','Juli','August','September','Oktober','November','Dezember'];
  const monthsFA=['ژانویه','فوریه','مارس','آوریل','مه','ژوئن','ژوئیه','اوت','سپتامبر','اکتبر','نوامبر','دسامبر'];
  document.getElementById('cal-month-label').textContent = `${monthsDE[calMonth]} / ${monthsFA[calMonth]} ${calYear}`;
  const grid = document.getElementById('cal-grid');
  // دوزبانه: Mo Di Mi Do Fr Sa So
  const daysDE=['Mo','Di','Mi','Do','Fr','Sa','So'];
  const daysFA=['د','س','چ','پ','ج','ش','ی'];
  let html = daysDE.map((d,i)=>`<div class="cal-day-name" title="${daysFA[i]}">${d}</div>`).join('');

  const holidays = getHolidays(calYear);
  const first = new Date(calYear, calMonth, 1);
  let startDay = first.getDay(); // 0=Sun → 6 in Mon-first
  startDay = startDay===0?6:startDay-1; // Mon=0 ... Sun=6
  const daysInMonth = new Date(calYear, calMonth+1, 0).getDate();
  const todayStr = today.toISOString().split('T')[0];
  const apptDates = new Set(appointments.map(a=>a.date));

  for(let i=0;i<startDay;i++) html+=`<div class="cal-day"></div>`;
  for(let d=1;d<=daysInMonth;d++){
    const dateStr = `${calYear}-${String(calMonth+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
    const isToday = dateStr===todayStr;
    const isSel = dateStr===selectedDate;
    const hasAppt = apptDates.has(dateStr);
    const holiday = holidays[dateStr];
    const dow = new Date(dateStr+'T00:00').getDay();
    const isWeekend = dow===0||dow===6;
    const classes = ['cal-day','current-month',
      isToday?'today':'',
      isSel?'selected':'',
      hasAppt?'has-appt':'',
      holiday?'holiday':'',
      (!holiday&&isWeekend)?'weekend':'',
    ].filter(Boolean).join(' ');
    html+=`<div class="${classes}" onclick="selectCalDay('${dateStr}')" title="${holiday?holiday.de:''}">${d}${holiday?'<span style="font-size:6px;display:block;line-height:1;">🎉</span>':''}</div>`;
  }
  grid.innerHTML = html;
  renderCalDayList();
}

function changeMonth(dir){
  calMonth+=dir;
  if(calMonth>11){calMonth=0;calYear++;}
  if(calMonth<0){calMonth=11;calYear--;}
  renderCalendar();
}

function selectCalDay(date){
  selectedDate=date;
  renderCalendar();
}

function renderCalDayList(){
  const appts = appointments.filter(a=>a.date===selectedDate).sort((a,b)=>(a.time||'').localeCompare(b.time||''));
  const d = new Date(selectedDate+'T00:00');
  const holidays = getHolidays(parseInt(selectedDate.split('-')[0]));
  const holiday = holidays[selectedDate];
  const daysDE=['Sonntag','Montag','Dienstag','Mittwoch','Donnerstag','Freitag','Samstag'];
  const label = `${daysDE[d.getDay()]}, ${d.getDate()}. ${['Jan','Feb','Mär','Apr','Mai','Jun','Jul','Aug','Sep','Okt','Nov','Dez'][d.getMonth()]} ${d.getFullYear()}`;
  document.getElementById('cal-selected-label').textContent = label;
  const el = document.getElementById('cal-day-list');
  let html = '';
  if(holiday){
    html+=`<div style="background:rgba(245,106,106,0.1);border:1px solid rgba(245,106,106,0.3);border-radius:10px;padding:10px 14px;margin-bottom:10px;direction:rtl;">
      <span style="color:#f56a6a;font-size:13px;">🎉 ${holiday.de} — ${holiday.fa}</span>
      <span style="font-size:11px;color:var(--muted);display:block;margin-top:2px;">Feiertag in Berlin & Brandenburg</span>
    </div>`;
  }
  if(appts.length===0){
    html+=`<div style="color:var(--muted);font-size:13px;direction:rtl;text-align:center;padding:20px;">این روز قراری ندارید</div>`;
  } else {
    html += appts.map(a=>apptCardHTML(a)).join('');
  }
  el.innerHTML = html;
}

function goToDate(date){
  selectedDate=date;
  calYear=parseInt(date.split('-')[0]);
  calMonth=parseInt(date.split('-')[1])-1;
  document.querySelectorAll('.nav-item')[1].click();
}

// ══════ ADD APPOINTMENT ══════
function resetForm(){
  document.getElementById('f-title').value='';
  document.getElementById('f-date').value=today.toISOString().split('T')[0];
  document.getElementById('f-time').value='';
  document.getElementById('f-loc').value='';
  document.getElementById('f-note').value='';
  document.getElementById('f-remind').value='';
  selectedCat='personal';
  renderCatSelector('cat-selector','selectedCat');
  document.getElementById('form-main-title').textContent='قرار جدید ✨';
  document.getElementById('save-btn').textContent='✅ ذخیره قرار';
  editId=null;
}

function saveAppointment(){
  const title = document.getElementById('f-title').value.trim();
  const date = document.getElementById('f-date').value;
  if(!title||!date){toast('❗ عنوان و تاریخ الزامی');return;}
  const appt = {
    id: editId||Date.now(),
    title, date,
    time: document.getElementById('f-time').value,
    location: document.getElementById('f-loc').value.trim(),
    note: document.getElementById('f-note').value.trim(),
    cat: selectedCat,
    remind: document.getElementById('f-remind').value,
    done: false,
    createdAt: Date.now()
  };
  if(editId){
    const idx=appointments.findIndex(a=>a.id===editId);
    if(idx>-1) appointments[idx]={...appointments[idx],...appt};
    toast('✅ ویرایش ذخیره شد!');
  } else {
    appointments.push(appt);
    toast('✅ قرار اضافه شد!');
  }
  save();
  resetForm();
  document.querySelectorAll('.nav-item')[0].click();
}

// ══════ ACTIONS ══════
function toggleDone(e,id){
  e.stopPropagation();
  const a=appointments.find(x=>x.id===id);
  if(a){a.done=!a.done;save();renderToday();renderCalDayList();toast(a.done?'✅ انجام شد!':'↩ باز شد');}
}

function deleteAppt(e,id){
  e.stopPropagation();
  if(!confirm('این قرار حذف شود؟')) return;
  appointments=appointments.filter(x=>x.id!==id);
  save();renderToday();renderCalendar();toast('🗑 حذف شد');
}

function openEdit(e,id){
  e.stopPropagation();
  const a=appointments.find(x=>x.id===id);
  if(!a) return;
  editId=id;
  editCat=a.cat;
  document.getElementById('e-title').value=a.title;
  document.getElementById('e-date').value=a.date;
  document.getElementById('e-time').value=a.time||'';
  document.getElementById('e-loc').value=a.location||'';
  document.getElementById('e-note').value=a.note||'';
  renderCatSelector('e-cat-selector','editCat');
  document.getElementById('edit-modal').classList.add('open');
}

function saveEdit(){
  const a=appointments.find(x=>x.id===editId);
  if(!a) return;
  a.title=document.getElementById('e-title').value.trim()||a.title;
  a.date=document.getElementById('e-date').value||a.date;
  a.time=document.getElementById('e-time').value;
  a.location=document.getElementById('e-loc').value.trim();
  a.note=document.getElementById('e-note').value.trim();
  a.cat=editCat;
  save();closeModal();renderToday();renderCalendar();toast('✅ ذخیره شد!');
}

function closeModal(){
  document.getElementById('edit-modal').classList.remove('open');
  editId=null;
}
document.getElementById('edit-modal').addEventListener('click',function(e){
  if(e.target===this) closeModal();
});

// ══════ AI CHAT ══════
function renderAI(){
  const qp = document.getElementById('quick-prompts');
  qp.innerHTML = QUICK_PROMPTS.map(p=>
    `<button class="quick-prompt" onclick="askQuick('${p}')">${p}</button>`
  ).join('');
  if(chatHistory.length===0){
    addAIMsg('سلام Negah عزیز! 👋\n\nمن دستیار هوشمند TerminMeister هستم. می‌تونم:\n\n• درباره قرارهات کمکت کنم\n• بگم چه مدارکی لازم داری\n• توضیح بدم چطور آماده بشی\n\nچطور می‌تونم کمک کنم؟');
  }
}

function addAIMsg(text){
  chatHistory.push({role:'assistant',text});
  renderMessages();
}
function addUserMsg(text){
  chatHistory.push({role:'user',text});
  renderMessages();
}

function renderMessages(){
  const el=document.getElementById('chat-messages');
  el.innerHTML=chatHistory.map(m=>`
    <div class="msg msg-${m.role==='assistant'?'ai':'user'}">${m.text.replace(/\n/g,'<br/>')}</div>
  `).join('');
  el.scrollTop=el.scrollHeight;
}

function askQuick(q){
  document.getElementById('chat-input').value=q;
  sendChat();
}

async function sendChat(){
  const input=document.getElementById('chat-input');
  const q=input.value.trim();
  if(!q) return;
  input.value='';
  addUserMsg(q);

  // loading
  const el=document.getElementById('chat-messages');
  el.innerHTML+=`<div class="msg-loading" id="ai-loading">
    <span class="typing-dot"></span><span class="typing-dot"></span><span class="typing-dot"></span>
  </div>`;
  el.scrollTop=el.scrollHeight;

  // context از قرارها
  const upcoming = appointments.filter(a=>a.date>=today.toISOString().split('T')[0])
    .sort((a,b)=>a.date.localeCompare(b.date)).slice(0,5)
    .map(a=>`- ${a.title} | ${a.date} ${a.time||''} | ${getCat(a.cat).fa} | ${a.location||''}`)
    .join('\n');

  try {
    const res = await fetch("https://api.anthropic.com/v1/messages",{
      method:"POST",
      headers:{"Content-Type":"application/json"},
      body:JSON.stringify({
        model:"claude-sonnet-4-20250514",
        max_tokens:600,
        system:`تو دستیار هوشمند یک اپ مدیریت قرار به نام TerminMeister هستی. به فارسی و آلمانی پاسخ می‌دهی. کاربر یک خانم ایرانی مقیم آلمان (نزدیک برلین) است.

قرارهای پیش روی کاربر:
${upcoming||'هیچ قراری ثبت نشده'}

وظایف تو:
- کمک درباره آماده‌سازی برای قرارها (پزشکی، اداری مثل Jobcenter/Ausländerbehörde، و غیره)
- توضیح مدارک لازم برای قرارهای مختلف در آلمان
- پاسخ به سوالات درباره قرارها
- پیشنهاد برای مدیریت بهتر وقت

کوتاه، مفید و دوستانه پاسخ بده. حداکثر ۱۵۰ کلمه.`,
        messages:[{role:"user",content:q}]
      })
    });
    const data=await res.json();
    const text=data.content?.find(c=>c.type==='text')?.text||'متأسفم، مشکلی پیش آمد.';
    document.getElementById('ai-loading')?.remove();
    addAIMsg(text);
  } catch(e){
    document.getElementById('ai-loading')?.remove();
    addAIMsg('❌ خطا در اتصال. اینترنت را بررسی کن.');
  }
}

// ══════ TOAST ══════
let toastTimer=null;
function toast(msg){
  const el=document.getElementById('toast');
  if(toastTimer) clearTimeout(toastTimer);
  el.classList.remove('show');
  el.textContent=msg;
  void el.offsetWidth;
  el.classList.add('show');
  toastTimer=setTimeout(()=>el.classList.remove('show'),2500);
}

// ══════ PWA ══════
let deferredPrompt;
window.addEventListener('beforeinstallprompt',e=>{
  e.preventDefault();deferredPrompt=e;
  document.getElementById('install-bar').classList.add('show');
});
document.getElementById('install-btn').addEventListener('click',()=>{
  if(deferredPrompt){deferredPrompt.prompt();deferredPrompt.userChoice.then(()=>{
    deferredPrompt=null;document.getElementById('install-bar').classList.remove('show');
  });}
});
if('serviceWorker' in navigator) navigator.serviceWorker.register('sw.js').catch(()=>{});

// ══════ START ══════
init();
</script>
